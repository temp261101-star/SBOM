name: Custom Hook

on:
  push:
    paths:
      - '**/*.xml'
      - '**/*.json'
      - '**/*.sql'

jobs:
  notify-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Send Full GitHub Payload to Backend
        run: |
          echo '${{ toJson(github.event) }}' > payload.json
          curl -X POST http://182.48.194.218:8181/auth/github/actionPayload \
            -H "Content-Type: application/json" \
            --data @payload.json
